<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Club カテエネ — 改善UI プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ko: #F5841F; --ky: #FFC800; --kr: #E83820;
  --kt: #009B8F; --kn: #1A2040;
  --font: 'Noto Sans JP', sans-serif;
  --font-logo: 'Kaisei Decol', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font); background: #0d0d14; }

/* ===================== DESKTOP SHELL ===================== */
.desktop-shell {
  display: flex;
  min-height: 100vh;
  align-items: stretch;
}

/* Left panel: info + QR */
.info-panel {
  width: 340px;
  flex-shrink: 0;
  background: #0d0d14;
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  padding: 36px 28px;
  gap: 0;
  overflow-y: auto;
}
